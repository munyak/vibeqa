[build]
  publish = "."
  command = "npm install"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@sparticuz/chromium-min"]

# Proxy auth API to Railway backend (Google OAuth, signup, login, sessions)
# Must come BEFORE the catch-all /api/* rule
[[redirects]]
  from = "/api/auth/*"
  to = "https://intuitive-insight-production-bb40.up.railway.app/api/auth/:splat"
  status = 200
  force = true

# Proxy billing API to Railway backend (Stripe, subscriptions)
[[redirects]]
  from = "/api/billing/*"
  to = "https://intuitive-insight-production-bb40.up.railway.app/api/billing/:splat"
  status = 200
  force = true

# Proxy user API to Railway backend (subscriptions, profile)
[[redirects]]
  from = "/api/user/*"
  to = "https://intuitive-insight-production-bb40.up.railway.app/api/user/:splat"
  status = 200
  force = true

# Proxy admin API to Railway backend
[[redirects]]
  from = "/api/admin/*"
  to = "https://intuitive-insight-production-bb40.up.railway.app/api/admin/:splat"
  status = 200
  force = true

# Proxy scan history reads to Railway (Supabase) — note: POST /api/scan stays on Netlify Functions
[[redirects]]
  from = "/api/scans"
  to = "https://intuitive-insight-production-bb40.up.railway.app/api/scans"
  status = 200
  force = true

[[redirects]]
  from = "/api/scans/*"
  to = "https://intuitive-insight-production-bb40.up.railway.app/api/scans/:splat"
  status = 200
  force = true

# Proxy individual scan reads to Railway
[[redirects]]
  from = "/api/scan/*"
  to = "https://intuitive-insight-production-bb40.up.railway.app/api/scan/:splat"
  status = 200
  force = true

# All other /api/* calls go to Netlify Functions (scan runs here via puppeteer)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
