<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>VibeQA 芒聙聰 Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a38;
  --text:#e8e8f0;--text2:#9898b0;--text3:#5a5a78;
  --accent:#6366f1;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--purple:#a855f7;--orange:#f97316;
  --r:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:13px;height:100vh;overflow:hidden}
#auth-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:100}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:48px;width:360px;text-align:center}
.auth-logo{font-size:28px;font-weight:800;letter-spacing:-1px;margin-bottom:8px}
.auth-logo span{color:var(--accent)}
.auth-sub{color:var(--text2);font-size:13px;margin-bottom:32px}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s}
.google-btn:hover{border-color:var(--accent);background:#1e1e2e}
.auth-note{color:var(--text3);font-size:11px;margin-top:20px}
.error-msg{color:var(--red);font-size:12px;margin-top:12px;min-height:16px}
#app{display:none;height:100vh}
#app.visible{display:flex}
#sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.logo-wrap{padding:20px 16px 12px;border-bottom:1px solid var(--border)}
.logo-wrap .name{font-size:18px;font-weight:800;letter-spacing:-0.5px}
.logo-wrap .name span{color:var(--accent)}
.logo-wrap .badge{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-top:2px}
nav{padding:12px 8px;flex:1}
.nav-group{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase;padding:8px 8px 4px}
nav a{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;color:var(--text2);cursor:pointer;font-size:12px;font-weight:500;transition:all .1s;text-decoration:none;margin-bottom:1px}
nav a:hover{background:var(--surface2);color:var(--text)}
nav a.active{background:rgba(99,102,241,.12);color:var(--accent)}
.sidebar-user{padding:12px 16px;border-top:1px solid var(--border)}
.sidebar-user .email{font-size:11px;color:var(--text3);margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.signout-btn{width:100%;padding:7px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text3);font-size:11px;cursor:pointer}
.signout-btn:hover{border-color:var(--red);color:var(--red)}
#main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:52px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.topbar-title{font-weight:700;font-size:16px}
.topbar-right{display:flex;align-items:center;gap:12px}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.refresh-btn{padding:6px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:11px;cursor:pointer}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent)}
#content{flex:1;overflow-y:auto;padding:20px 24px}
.loading{display:flex;align-items:center;gap:12px;color:var(--text3);padding:40px}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.kpi-label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.kpi-val{font-size:26px;font-weight:800;letter-spacing:-1px;margin-bottom:4px}
.kpi-delta{font-size:11px;color:var(--text3)}
.delta-up{color:var(--green)}
.delta-neu{color:var(--text3)}
.delta-down{color:var(--red)}
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:20px;overflow:hidden}
.section-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border)}
.section-title{font-weight:700;font-size:13px}
.section-sub{font-size:11px;color:var(--text3)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 16px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 16px;border-bottom:1px solid rgba(42,42,56,.5);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(26,26,36,.5)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.badge-gray{background:rgba(88,88,110,.15);color:var(--text3)}
.badge-blue{background:rgba(99,102,241,.15);color:var(--accent)}
.badge-green{background:rgba(34,197,94,.15);color:var(--green)}
.badge-purple{background:rgba(168,85,247,.15);color:var(--purple)}
.badge-red{background:rgba(239,68,68,.15);color:var(--red)}
.badge-yellow{background:rgba(234,179,8,.15);color:var(--yellow)}
.badge-orange{background:rgba(249,115,22,.15);color:var(--orange)}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden}
.user-avatar img{width:100%;height:100%;object-fit:cover}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.filter-chip{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:11px;cursor:pointer;transition:all .1s}
.filter-chip.active{border-color:var(--accent);color:var(--accent);background:rgba(99,102,241,.08)}
.search-input{padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:12px;outline:none;width:280px}
.search-input:focus{border-color:var(--accent)}
.empty{text-align:center;padding:40px;color:var(--text3)}
.bar-chart{display:flex;align-items:flex-end;gap:3px;height:80px}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.bar{width:100%;background:var(--accent);border-radius:3px 3px 0 0;min-height:2px;transition:height .3s}
.bar-label{font-size:8px;color:var(--text3);text-align:center}
.feed{display:flex;flex-direction:column;gap:0}
.feed-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid rgba(42,42,56,.4)}
.feed-item:last-child{border-bottom:none}
.feed-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.feed-body{flex:1;min-width:0}
.feed-text{font-size:12px;line-height:1.5;color:var(--text2)}
.feed-time{font-size:10px;color:var(--text3);margin-top:3px}
.funnel{display:flex;flex-direction:column;gap:12px}
.funnel-step{display:flex;flex-direction:column;gap:6px}
.funnel-label{font-size:11px;color:var(--text3);font-weight:600}
.funnel-bar-wrap{background:var(--surface2);border-radius:4px;height:28px;overflow:hidden}
.funnel-fill{height:100%;display:flex;align-items:center;padding:0 10px;font-size:11px;font-weight:700;color:#fff;border-radius:4px;transition:width .5s;min-width:32px}
.funnel-count{font-size:11px;font-weight:600}
/* Stripe setup */
.stripe-setup{padding:24px;display:flex;flex-direction:column;gap:16px}
.stripe-input-row{display:flex;gap:12px;align-items:flex-end}
.form-group{display:flex;flex-direction:column;gap:6px;flex:1}
.form-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.form-input{padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:12px;outline:none;font-family:monospace}
.form-input:focus{border-color:var(--accent)}
.btn-primary{padding:9px 20px;background:var(--accent);border:none;border-radius:var(--r);color:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.btn-primary:hover{background:#5254cc}
.btn-secondary{padding:9px 20px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.info-box{padding:12px 16px;background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.2);border-radius:var(--r);font-size:12px;color:var(--text2);line-height:1.6}
.success-box{padding:10px 14px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:var(--r);font-size:12px;color:var(--green)}
.scan-results-preview{font-size:11px;color:var(--text3);max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.score-ring{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;font-size:13px;font-weight:800}
.score-good{background:rgba(34,197,94,.15);color:var(--green)}
.score-warn{color:var(--yellow)}
.score-bad{background:rgba(239,68,68,.15);color:var(--red)}
.score-none{background:var(--surface2);color:var(--text3)}
.expandable-row{cursor:pointer}
.expandable-row:hover td{background:rgba(99,102,241,.04)!important}
.detail-row td{background:var(--surface2)!important;padding:0}
.detail-content{padding:16px 20px;border-top:1px solid var(--border)}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:16px}
.detail-item{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 14px}
.detail-item label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;display:block;margin-bottom:4px}
.detail-item value{font-size:14px;font-weight:700;display:block}
.issues-list{display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto}
.issue-item{padding:8px 12px;background:var(--surface);border-radius:6px;font-size:11px;border-left:3px solid var(--border)}
.issue-critical{border-left-color:var(--red)}
.issue-warn{border-left-color:var(--yellow)}
.issue-pass{border-left-color:var(--green)}
</style>
</head>

async function signInWithGoogle() {
  const { error } = await db.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.href }
  });
  if (error) document.getElementById('auth-error').textContent = error.message;
}

async function signOut() {
  await db.auth.signOut();
  location.reload();
}

async function initAuth() {
  const { data: { session } } = await db.auth.getSession();
  if (session) {
    const email = session.user.email;
    if (email !== ADMIN_EMAIL) {
      await db.auth.signOut();
      document.getElementById('auth-error').textContent = `Access denied for ${email}. Admin only.`;
      return;
    }
    _sessionToken = session.access_token;
    document.getElementById('user-email').textContent = email;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    loadData();
  }
  db.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN') { _sessionToken = session?.access_token; initAuth(); }
  });
}

async function loadData() {
  document.getElementById('last-refresh').textContent = 'Loading芒聙娄';
  try {
    const [usersRes, scansRes] = await Promise.all([
      db.rpc('get_admin_users'),
      db.rpc('get_admin_scans'),
    ]);
    if (usersRes.error) throw usersRes.error;
    if (scansRes.error) throw scansRes.error;
    allUsers = usersRes.data || [];
    allScans = scansRes.data || [];
    document.getElementById('last-refresh').textContent = 'Updated ' + new Date().toLocaleTimeString();
    renderCurrentView();
  } catch(e) {
    console.error('Load error:', e);
    document.getElementById('last-refresh').textContent = 'Error: ' + e.message;
    document.getElementById('content').innerHTML = `<div class="loading" style="color:var(--red)">芒職聽 ${e.message}</div>`;
  }
}

async function callStripe(path, params) {
  if (!_sessionToken) return null;
  try {
    const url = STRIPE_FN_URL + '?path=' + encodeURIComponent(path) + (params ? '&params=' + encodeURIComponent(params) : '');
    const res = await fetch(url, {
      headers: { 'Authorization': 'Bearer ' + _sessionToken }
    });
    return await res.json();
  } catch(e) {
    return { error: e.message };
  }
}

async function saveStripeKey(key) {
  if (!_sessionToken) return { error: 'Not authenticated' };
  const res = await fetch(STRIPE_FN_URL + '?action=save_stripe_key', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + _sessionToken, 'Content-Type': 'application/json' },
    body: JSON.stringify({ stripe_key: key })
  });
  return await res.json();
}

function showView(v) {
  currentView = v;
  document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
  const el = document.getElementById('nav-' + v);
  if (el) el.classList.add('active');
  document.getElementById('view-title').textContent = VIEW_TITLES[v] || v;
  renderCurrentView();
}

function renderCurrentView() {
  switch(currentView) {
    case 'overview':  renderOverview(); break;
    case 'users':     renderUsers(); break;
    case 'signups':   renderSignups(); break;
    case 'scans':     renderScans(); break;
    case 'activity':  renderActivity(); break;
    case 'revenue':   renderRevenue(); break;
    case 'funnel':    renderFunnel(); break;
  }
}

function fmt(n) { return n >= 1000 ? (n/1000).toFixed(1)+'K' : n; }
function fmtDate(d) { return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function fmtTime(d) { return new Date(d).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); }
function daysAgo(d) {
  const diff = Date.now() - new Date(d).getTime();
  const days = Math.floor(diff/86400000);
  if (days === 0) return 'Today';
  if (days === 1) return 'Yesterday';
  return days + 'd ago';
}
function withinDays(d, n) { return (Date.now() - new Date(d).getTime()) < n * 86400000; }
function planBadge(p) {
  const map = { free:'badge-gray', pro:'badge-blue', team:'badge-purple', enterprise:'badge-green' };
  return `<span class="badge ${map[p]||'badge-gray'}">${p||'free'}</span>`;
}
function statusBadge(s) {
  const map = { completed:'badge-green', pending:'badge-yellow', failed:'badge-red', running:'badge-blue' };
  return `<span class="badge ${map[s]||'badge-gray'}">${s||'pending'}</span>`;
}
function initials(name) { return (name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
function strColor(str) {
  const colors = ['#6366f1','#a855f7','#22c55e','#f97316','#ef4444','#0ea5e9','#eab308'];
  let h = 0; for (let c of (str||'')) h = (h*31 + c.charCodeAt(0)) % colors.length;
  return colors[h];
}
function scoreClass(s) {
  if (s === null || s === undefined) return 'score-none';
  if (s >= 80) return 'score-good';
  if (s >= 50) return 'score-warn';
  return 'score-bad';
}
function signupsInRange(days) { return allUsers.filter(u => withinDays(u.created_at, days)).length; }
function activeInRange(days) { return allUsers.filter(u => u.is_active && u.last_seen_at && withinDays(u.last_seen_at, days)).length; }

          const pct = mrr>0?(rev/mrr*100).toFixed(0):0;

            <div style="display:flex;justify-content:space-between;margin-bottom:5px">
              <span style="font-size:13px;font-weight:600;text-transform:capitalize">${p}</span>
              <span style="font-size:13px;font-weight:700;color:var(--green)">$${rev.toLocaleString()}/mo</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:5px"><span>${users.length} users 脙聴 $${PRICES[p]}</span><span>${pct}% of MRR</span></div>
            <div style="height:5px;background:var(--surface2);border-radius:3px"><div style="height:5px;width:${pct}%;border-radius:3px;background:${p==='enterprise'?'var(--green)':p==='team'?'var(--purple)':'var(--accent)'}"></div></div>
          </div>`;
        }).join('')}
      </div>
    </div>
    <div class="section">
      <div class="section-head"><div class="section-title">Paid Users</div></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Email</th><th>Plan</th><th>MRR</th><th>Stripe</th></tr></thead>
          <tbody>
            ${paid.slice(0,12).map(u=>`<tr>
              <td style="font-size:12px">${u.email}</td>
              <td>${planBadge(u.plan)}</td>
              <td style="font-weight:700;color:var(--green)">$${PRICES[u.plan]||0}/mo</td>
              <td style="font-size:11px">${u.stripe_customer_id?`<span style="color:var(--green)">芒聹聯</span>`:'-'}</td>
            </tr>`).join('') || `<tr><td colspan="4"><div class="empty">No paid users yet.</div></td></tr>`}
          </tbody>
        </table>
      </div>
    </div>
  </div>`;

  // Try to load live Stripe data
  loadStripeData();
}

async function handleSaveStripeKey() {
  const key = document.getElementById('stripe-key-input')?.value?.trim();
  if (!key) return;
  const statusEl = document.getElementById('stripe-save-status');
  statusEl.innerHTML = '<span style="color:var(--text3)">Saving芒聙娄</span>';
  const result = await saveStripeKey(key);
  if (result.success) {
    statusEl.innerHTML = '<div class="success-box">芒聹聯 Stripe key saved. Loading data芒聙娄</div>';
    setTimeout(loadStripeData, 500);
  } else {
    statusEl.innerHTML = `<span style="color:var(--red)">Error: ${result.error||'Failed to save'}</span>`;
  }
}

async function loadStripeData() {
  const container = document.getElementById('stripe-live-data');
  if (!container) return;
  container.innerHTML = '<div class="loading" style="padding:20px"><div class="spinner"></div>Loading Stripe data芒聙娄</div>';

  const [balance, customers, subs, charges] = await Promise.all([
    callStripe('/v1/balance'),
    callStripe('/v1/customers', 'limit=100&expand[]=data.subscriptions'),
    callStripe('/v1/subscriptions', 'limit=100&status=active'),
    callStripe('/v1/charges', 'limit=20'),
  ]);

  if (balance?.error === 'Stripe key not configured' || balance?.needs_setup) {
    container.innerHTML = '';
    return;
  }
  if (balance?.error) {
    container.innerHTML = `<div style="padding:12px 16px;color:var(--red);font-size:12px">芒職聽 Stripe error: ${balance.error}</div>`;
    return;
  }

  const avail = (balance?.available||[]).reduce((s,b)=>s+b.amount,0)/100;
  const pending = (balance?.pending||[]).reduce((s,b)=>s+b.amount,0)/100;
  const activeSubs = subs?.data?.length || 0;
  const liveCustomers = customers?.data?.length || 0;
  const recentRevenue = (charges?.data||[]).filter(c=>c.status==='succeeded').reduce((s,c)=>s+c.amount,0)/100;

  container.innerHTML = `
  <div style="padding:12px 0 4px"><div style="font-size:10px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin-bottom:12px">Live Stripe Data</div></div>
  <div class="kpi-grid" style="margin-bottom:20px">
    <div class="kpi"><div class="kpi-label">Balance (Available)</div><div class="kpi-val" style="color:var(--green)">$${avail.toFixed(2)}</div><div class="kpi-delta delta-neu">Stripe account</div></div>
    <div class="kpi"><div class="kpi-label">Pending</div><div class="kpi-val">$${pending.toFixed(2)}</div><div class="kpi-delta delta-neu">in transit</div></div>
    <div class="kpi"><div class="kpi-label">Active Subs</div><div class="kpi-val" style="color:var(--purple)">${activeSubs}</div><div class="kpi-delta delta-neu">paying customers</div></div>
    <div class="kpi"><div class="kpi-label">Customers</div><div class="kpi-val">${liveCustomers}</div><div class="kpi-delta delta-neu">in Stripe</div></div>
    <div class="kpi"><div class="kpi-label">Recent Revenue</div><div class="kpi-val" style="color:var(--green)">$${recentRevenue.toFixed(2)}</div><div class="kpi-delta delta-neu">last 20 charges</div></div>
  </div>
  <div class="section">
    <div class="section-head"><div class="section-title">Recent Charges</div></div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Customer</th><th>Amount</th><th>Status</th><th>Description</th><th>Date</th></tr></thead>
        <tbody>
          ${(charges?.data||[]).slice(0,15).map(c=>`<tr>
            <td style="font-size:12px">${c.billing_details?.email||c.customer||'芒聙聰'}</td>
            <td style="font-weight:700;color:var(--green)">$${(c.amount/100).toFixed(2)} ${c.currency?.toUpperCase()}</td>
            <td><span class="badge ${c.status==='succeeded'?'badge-green':c.status==='failed'?'badge-red':'badge-yellow'}">${c.status}</span></td>
            <td style="color:var(--text2);font-size:11px">${c.description||c.statement_descriptor||'芒聙聰'}</td>
            <td style="color:var(--text2);font-size:11px">${fmtTime(new Date(c.created*1000))}</td>
          </tr>`).join('') || '<tr><td colspan="5"><div class="empty">No charges found.</div></td></tr>'}
        </tbody>
      </table>
    </div>
  </div>
  <div class="section">
    <div class="section-head"><div class="section-title">Active Subscriptions</div></div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Customer</th><th>Plan</th><th>Amount</th><th>Status</th><th>Since</th><th>Next Bill</th></tr></thead>
        <tbody>
          ${(subs?.data||[]).slice(0,15).map(s=>{
            const item = s.items?.data?.[0];
            const amt = item ? (item.price?.unit_amount||0)/100 : 0;
            const interval = item?.price?.recurring?.interval || '';
            return `<tr>
              <td style="font-size:12px">${s.customer_email||s.customer||'芒聙聰'}</td>
              <td style="font-size:12px">${item?.price?.nickname||item?.price?.id||'芒聙聰'}</td>
              <td style="font-weight:700;color:var(--green)">$${amt.toFixed(2)}/${interval}</td>
              <td><span class="badge ${s.status==='active'?'badge-green':s.status==='past_due'?'badge-red':'badge-yellow'}">${s.status}</span></td>
              <td style="color:var(--text2);font-size:11px">${fmtTime(new Date(s.start_date*1000))}</td>
              <td style="color:var(--text2);font-size:11px">${s.current_period_end?fmtTime(new Date(s.current_period_end*1000)):'芒聙聰'}</td>
            </tr>`;
          }).join('') || '<tr><td colspan="6"><div class="empty">No active subscriptions.</div></td></tr>'}
        </tbody>
      </table>
    </div>
  </div>`;
}

function renderFunnel() {
  const total     = allUsers.length;
  const scanned   = [...new Set(allScans.map(s=>s.user_id))].length;
  const retained  = allUsers.filter(u=>u.last_seen_at && withinDays(u.last_seen_at,14)).length;
  const paid      = allUsers.filter(u=>u.plan&&u.plan!=='free').length;
  const churned   = Math.floor(paid * 0.08);
  const steps = [
    { label:'Visited / Signed Up', count:total,    color:'var(--accent)'  },
    { label:'Ran a Scan',          count:scanned,   color:'var(--purple)'  },
    { label:'Retained (14d)',      count:retained,  color:'var(--green)'   },
    { label:'Converted (paid)',    count:paid,      color:'var(--yellow)'  },
    { label:'Churned (est.)',      count:churned,   color:'var(--red)'     },
  ];
  const max = total || 1;
  document.getElementById('content').innerHTML = `
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
    <div class="section">
      <div class="section-head"><div class="section-title">Conversion Funnel</div></div>
      <div class="table-wrap" style="padding:24px 20px">
        <div class="funnel">
          ${steps.map((s,i)=>{
            const pct = (s.count/max*100).toFixed(0);
            const vsTop = i>0 ? ((s.count/total)*100).toFixed(1)+'% of signups' : '100%';
            return `<div class="funnel-step">
              <div class="funnel-label">${s.label}</div>
              <div class="funnel-bar-wrap">
                <div class="funnel-fill" style="width:${pct}%;background:${s.color};opacity:.85">${s.count}</div>
              </div>
              <div class="funnel-count" style="color:${s.color}">${vsTop}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>
    <div class="section">
      <div class="section-head"><div class="section-title">Key Ratios</div></div>
      <div class="kpi-grid" style="grid-template-columns:1fr 1fr;padding:16px">
        <div class="kpi"><div class="kpi-label">Scan Rate</div><div class="kpi-val">${total>0?((scanned/total)*100).toFixed(0):0}%</div><div class="kpi-delta delta-neu">signups 芒聠聮 first scan</div></div>
        <div class="kpi"><div class="kpi-label">Retention</div><div class="kpi-val">${total>0?((retained/total)*100).toFixed(0):0}%</div><div class="kpi-delta delta-neu">active 14d</div></div>
        <div class="kpi"><div class="kpi-label">Conversion</div><div class="kpi-val">${total>0?((paid/total)*100).toFixed(1):0}%</div><div class="kpi-delta delta-neu">free 芒聠聮 paid</div></div>
        <div class="kpi"><div class="kpi-label">Churn (Est.)</div><div class="kpi-val" style="color:var(--red)">${paid>0?((churned/paid)*100).toFixed(0):0}%</div><div class="kpi-delta delta-neu">monthly</div></div>
      </div>
      <div style="margin:0 16px 16px;padding:14px;background:var(--surface2);border-radius:var(--r);font-size:12px;color:var(--text2);line-height:1.7">
        <strong style="color:var(--text)">B2B SaaS QA benchmarks:</strong><br>
        Scan rate: 40芒聙聯60% is good 脗路 Retention (14d): 25芒聙聯40% is healthy<br>
        Free芒聠聮Paid: 2芒聙聯5% is typical, 5%+ is strong 脗路 Monthly churn: &lt;5% is good
      </div>
    </div>
  </div>`;
}
