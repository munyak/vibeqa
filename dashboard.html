<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — VibeQA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white: #FFFFFF;
      --black: #09090B;
      --gray-50: #F4F4F5;
      --gray-100: #E4E4E7;
      --gray-200: #D4D4D8;
      --gray-300: #A1A1AA;
      --gray-400: #71717A;
      --gray-500: #52525B;
      --gray-600: #3F3F46;
      --gray-900: #18181B;
      --accent: #6366F1;
      --accent-dark: #4F46E5;
      --green: #22C55E;
      --red: #EF4444;
      --yellow: #F59E0B;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--gray-50);
      color: var(--black);
      line-height: 1.6;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    h1, h2, h3, h4 { line-height: 1.2; letter-spacing: -0.025em; font-weight: 600; }

    .container { max-width: 1120px; margin: 0 auto; padding: 0 24px; }

    nav {
      background: var(--white);
      border-bottom: 1px solid var(--gray-100);
      padding: 16px 0;
    }

    nav .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo { font-size: 20px; font-weight: 700; color: var(--black); text-decoration: none; }
    .logo span { color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .user-info { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--gray-600); }

    .plan-badge {
      padding: 2px 8px; border-radius: 4px;
      font-size: 12px; font-weight: 600; text-transform: uppercase;
    }
    .plan-badge.free       { background: var(--gray-100); color: var(--gray-600); }
    .plan-badge.pro        { background: #E0E7FF; color: var(--accent); }
    .plan-badge.team       { background: #DCFCE7; color: #16A34A; }
    .plan-badge.enterprise { background: #FEF3C7; color: #D97706; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 8px 16px; border-radius: 8px; font-weight: 500; font-size: 14px;
      text-decoration: none; cursor: pointer; border: none; transition: all 0.15s;
    }
    .btn-primary   { background: var(--black); color: var(--white); }
    .btn-primary:hover { background: var(--gray-900); }
    .btn-secondary { background: transparent; color: var(--gray-600); border: 1px solid var(--gray-200); }
    .btn-secondary:hover { background: var(--gray-50); }
    .btn-accent    { background: var(--accent); color: var(--white); }
    .btn-accent:hover { background: var(--accent-dark); }

    main { padding: 40px 0; }

    .dashboard-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 32px;
    }
    .dashboard-header h1 { font-size: 24px; }

    /* ── Stats row ── */
    .stats {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 20px; margin-bottom: 24px;
    }
    .stat-card {
      background: var(--white); padding: 24px;
      border-radius: 12px; border: 1px solid var(--gray-100);
    }
    .stat-card h3 {
      font-size: 12px; color: var(--gray-400); font-weight: 500;
      margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .stat-card .value  { font-size: 32px; font-weight: 700; }
    .stat-card .subtext { font-size: 13px; color: var(--gray-400); margin-top: 4px; }

    .usage-bar-wrap { margin-top: 8px; }
    .usage-bar-bg { height: 4px; background: var(--gray-100); border-radius: 99px; overflow: hidden; }
    .usage-bar-fill {
      height: 100%; border-radius: 99px; background: var(--accent);
      transition: width 0.4s ease;
    }
    .usage-bar-fill.warn { background: var(--yellow); }
    .usage-bar-fill.full { background: var(--red); }

    /* ── Plan card ── */
    .plan-card {
      background: var(--white); border-radius: 12px; border: 1px solid var(--gray-100);
      padding: 24px; margin-bottom: 24px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 24px; flex-wrap: wrap;
    }
    .plan-card-left { display: flex; align-items: center; gap: 16px; }
    .plan-icon {
      width: 44px; height: 44px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .plan-icon.free       { background: var(--gray-100); }
    .plan-icon.pro        { background: #E0E7FF; }
    .plan-icon.team       { background: #DCFCE7; }
    .plan-icon.enterprise { background: #FEF3C7; }
    .plan-card-info h2 { font-size: 16px; margin-bottom: 4px; }
    .plan-card-info p  { font-size: 13px; color: var(--gray-400); }
    .plan-card-meta { display: flex; gap: 32px; flex-wrap: wrap; }
    .plan-meta-item { text-align: center; }
    .plan-meta-item .meta-label { font-size: 12px; color: var(--gray-400); margin-bottom: 2px; }
    .plan-meta-item .meta-value { font-size: 15px; font-weight: 600; }

    .status-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      margin-right: 5px; vertical-align: middle;
    }
    .status-dot.active   { background: var(--green); }
    .status-dot.free     { background: var(--gray-300); }
    .status-dot.past_due { background: var(--yellow); }
    .status-dot.canceled { background: var(--red); }

    /* ── Scanner ── */
    .scanner-box {
      background: var(--white); padding: 24px;
      border-radius: 12px; border: 1px solid var(--gray-100); margin-bottom: 24px;
    }
    .scanner-box h2 { font-size: 16px; margin-bottom: 16px; }
    .scanner-input { display: flex; gap: 12px; }
    .scanner-input input {
      flex: 1; padding: 12px 16px; border: 1px solid var(--gray-200);
      border-radius: 8px; font-size: 15px; font-family: inherit; outline: none;
    }
    .scanner-input input:focus { border-color: var(--accent); }

    /* ── Scans list ── */
    .scans-list {
      background: var(--white); border-radius: 12px; border: 1px solid var(--gray-100);
    }
    .scans-list h2 {
      font-size: 16px; padding: 20px 24px; border-bottom: 1px solid var(--gray-100);
    }
    .scan-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 24px; border-bottom: 1px solid var(--gray-100);
    }
    .scan-item:last-child { border-bottom: none; }
    .scan-url  { font-weight: 500; color: var(--black); margin-bottom: 4px; }
    .scan-meta { font-size: 13px; color: var(--gray-400); }
    .scan-status {
      padding: 4px 10px; border-radius: 100px; font-size: 12px; font-weight: 500;
    }
    .scan-status.complete { background: #DCFCE7; color: #16A34A; }
    .scan-status.scanning { background: #FEF3C7; color: #D97706; }
    .scan-status.error    { background: #FEE2E2; color: #DC2626; }
    .scan-status.pending  { background: var(--gray-100); color: var(--gray-500); }

    .empty-state { text-align: center; padding: 60px 24px; color: var(--gray-400); }

    /* ── Clickable scan items ── */
    .scan-item { cursor: pointer; transition: background 0.1s; }
    .scan-item:hover { background: var(--gray-50); }

    /* ── Issue count badges ── */
    .scan-badge {
      font-size: 12px; font-weight: 500; padding: 3px 9px;
      border-radius: 100px; white-space: nowrap;
    }
    .badge-critical { background: #FEE2E2; color: #DC2626; }
    .badge-warning  { background: #FEF3C7; color: #D97706; }
    .badge-info     { background: #CCFBF1; color: #0F766E; }
    .badge-success  { background: #DCFCE7; color: #16A34A; }

    /* ── Scan detail modal ── */
    .modal-overlay {
      display: none; position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); z-index: 1000;
      align-items: flex-start; justify-content: center;
      padding: 40px 20px; overflow-y: auto;
    }
    .modal-overlay.visible { display: flex; }
    .modal {
      background: var(--white); border-radius: 16px;
      width: 100%; max-width: 700px;
      max-height: calc(100vh - 80px); overflow-y: auto;
    }
    .modal-header {
      padding: 20px 24px; border-bottom: 1px solid var(--gray-100);
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; background: white; z-index: 10;
    }
    .modal-header h2 { font-size: 18px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 580px; }
    .modal-close { background: none; border: none; cursor: pointer; color: var(--gray-400); padding: 4px; }
    .modal-close:hover { color: var(--black); }
    .modal-body { padding: 24px; }
    .modal-meta { font-size: 13px; color: var(--gray-400); margin-bottom: 20px; display: flex; gap: 20px; flex-wrap: wrap; }
    .modal-actions { display: flex; gap: 8px; margin-bottom: 20px; }
    .btn-copy {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px; background: var(--gray-50);
      border: 1px solid var(--gray-200); border-radius: 8px;
      font-size: 13px; font-weight: 500; color: var(--gray-600); cursor: pointer;
    }
    .btn-copy:hover { background: var(--gray-100); }
    .btn-copy.copied { background: #DCFCE7; border-color: #86EFAC; color: #16A34A; }
    .issue {
      padding: 16px; border: 1px solid var(--gray-100);
      border-radius: 10px; margin-bottom: 12px;
    }
    .issue.critical { border-left: 3px solid var(--red); }
    .issue.warning  { border-left: 3px solid var(--yellow); }
    .issue.info     { border-left: 3px solid var(--accent); }
    .issue-header   { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .issue-title    { font-weight: 600; font-size: 14px; }
    .issue-category { font-size: 12px; color: var(--gray-400); }
    .issue-description { font-size: 13px; color: var(--gray-500); margin-bottom: 8px; white-space: pre-wrap; }
    .issue-suggestion  { font-size: 12px; background: var(--gray-50); padding: 10px; border-radius: 6px; white-space: pre-wrap; }

    @media (max-width: 768px) {
      .stats { grid-template-columns: 1fr; }
      .scanner-input { flex-direction: column; }
      .plan-card { flex-direction: column; align-items: flex-start; }
      .plan-card-meta { gap: 16px; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="container">
      <a href="/" class="logo">Vibe<span>QA</span></a>
      <div class="nav-right">
        <div class="user-info">
          <span id="user-email"></span>
          <span class="plan-badge free" id="plan-badge">Free</span>
        </div>
        <button class="btn btn-secondary" id="upgrade-btn" onclick="upgrade()">Upgrade</button>
        <a href="/settings" class="btn btn-secondary">Settings</a>
        <button class="btn btn-secondary" onclick="logout()">Log out</button>
      </div>
    </div>
  </nav>

  <main>
    <div class="container">
      <div class="dashboard-header">
        <h1>Dashboard</h1>
      </div>

      <!-- Usage stats -->
      <div class="stats">
        <div class="stat-card">
          <h3>Scans Today</h3>
          <div class="value" id="scans-today">—</div>
          <div class="subtext" id="scans-today-limit">loading…</div>
          <div class="usage-bar-wrap">
            <div class="usage-bar-bg">
              <div class="usage-bar-fill" id="bar-today" style="width:0%"></div>
            </div>
          </div>
        </div>
        <div class="stat-card">
          <h3>Scans This Month</h3>
          <div class="value" id="scans-month">—</div>
          <div class="subtext" id="scans-month-limit">loading…</div>
          <div class="usage-bar-wrap">
            <div class="usage-bar-bg">
              <div class="usage-bar-fill" id="bar-month" style="width:0%"></div>
            </div>
          </div>
        </div>
        <div class="stat-card">
          <h3>Total Scans</h3>
          <div class="value" id="scans-total">—</div>
          <div class="subtext">all time</div>
        </div>
      </div>

      <!-- Plan / Subscription card -->
      <div class="plan-card">
        <div class="plan-card-left">
          <div class="plan-icon free" id="plan-icon">✦</div>
          <div class="plan-card-info">
            <h2 id="plan-display-name">Loading plan…</h2>
            <p id="plan-description">Fetching your subscription details</p>
          </div>
        </div>
        <div class="plan-card-meta">
          <div class="plan-meta-item">
            <div class="meta-label">Status</div>
            <div class="meta-value" id="plan-status">—</div>
          </div>
          <div class="plan-meta-item">
            <div class="meta-label">Daily limit</div>
            <div class="meta-value" id="plan-daily">—</div>
          </div>
          <div class="plan-meta-item">
            <div class="meta-label">Monthly limit</div>
            <div class="meta-value" id="plan-monthly">—</div>
          </div>
          <div class="plan-meta-item">
            <div class="meta-label">Renews</div>
            <div class="meta-value" id="plan-renewal">—</div>
          </div>
        </div>
        <button class="btn btn-accent" id="plan-action-btn" onclick="upgrade()">Upgrade Plan</button>
      </div>

      <!-- Scanner -->
      <div class="scanner-box">
        <h2>Run New Scan</h2>
        <div class="scanner-input">
          <input type="url" id="url-input" placeholder="https://your-site.com" />
          <button class="btn btn-accent" id="scan-btn" onclick="startScan()">Scan Now</button>
        </div>
        <label style="display:flex;align-items:center;gap:8px;margin-top:12px;font-size:12px;color:var(--gray-400);cursor:pointer;user-select:none">
          <input type="checkbox" id="own-site-checkbox" style="width:16px;height:16px;accent-color:var(--accent);cursor:pointer" />
          <span>I confirm I own or have authorization to scan this site. <a href="/terms.html" style="color:var(--accent);text-decoration:none">Terms apply.</a></span>
        </label>
      </div>

      <!-- Recent scans -->
      <div class="scans-list">
        <h2>Recent Scans</h2>
        <div id="scans-container">
          <div class="empty-state">Loading scans…</div>
        </div>
      </div>
    </div>
  </main>

  <!-- Scan Detail Modal -->
  <div class="modal-overlay" id="scan-modal" onclick="if(event.target.id==='scan-modal')closeModal()">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Scan Details</h2>
        <button class="modal-close" onclick="closeModal()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="modal-meta" id="modal-meta"></div>
        <div class="modal-actions">
          <button class="btn-copy" onclick="copyAsPrompt()" id="modal-copy-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            Copy as Prompt
          </button>
        </div>
        <div id="modal-issues"></div>
      </div>
    </div>
  </div>

  <script>
    // API_URL: vibeqa.io in production (Netlify proxies /api/auth|billing|user/* to Railway)
    const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:3847'
      : 'https://vibeqa.io';

    let token = localStorage.getItem('vibeqa_token');
    let user  = null;
    let subscription = null;
    let scans = [];        // module-level — needed by showScan()
    let currentScan = null;

    async function init() {
      if (!token) { window.location.href = '/'; return; }

      try {
        const res = await fetch(`${API_URL}/api/auth/me`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) {
          localStorage.removeItem('vibeqa_token');
          window.location.href = '/';
          return;
        }
        user = await res.json();
        updateNavUI();
        // Load subscription and scans in parallel
        await Promise.all([loadSubscription(), loadScans()]);
      } catch (err) {
        console.error('Init error:', err);
        window.location.href = '/';
      }
    }

    function updateNavUI() {
      document.getElementById('user-email').textContent = user.email;
      const badge = document.getElementById('plan-badge');
      badge.textContent = capitalize(user.plan);
      badge.className   = `plan-badge ${user.plan}`;
      if (user.plan !== 'free') {
        document.getElementById('upgrade-btn').textContent = 'Manage';
      }
    }

    async function loadSubscription() {
      try {
        const res = await fetch(`${API_URL}/api/user/subscriptions`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.ok) {
          subscription = await res.json();
        } else {
          // Graceful fallback to billing/info
          const fb = await fetch(`${API_URL}/api/billing/info`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          const info = fb.ok ? await fb.json() : {};
          subscription = buildFallbackSubscription(info);
        }
      } catch (err) {
        console.warn('Using fallback subscription data:', err.message);
        subscription = buildFallbackSubscription({});
      }
      renderSubscription();
    }

    function buildFallbackSubscription(info) {
      const plan = info.plan || user.plan || 'free';
      const limits = {
        free: { day: 1,        month: 30  },
        pro:  { day: 100,      month: 1000 },
        team: { day: 500,      month: 5000 },
      };
      const l = limits[plan] || limits.free;
      return {
        currentPlan: plan,
        planLabel: capitalize(plan),
        status: plan === 'free' ? 'free' : 'active',
        renewalDate: null,
        limits: { scansPerDay: l.day, scansPerMonth: l.month },
        usage: { scansToday: 0, scansThisMonth: 0, scansAllTime: 0 },
      };
    }

    function renderSubscription() {
      const plan = subscription.currentPlan;

      // Icon + name + price
      const icon = document.getElementById('plan-icon');
      icon.className  = `plan-icon ${plan}`;
      icon.textContent = plan === 'free' ? '✦' : plan === 'pro' ? '⚡' : '🚀';
      document.getElementById('plan-display-name').textContent = `${subscription.planLabel} Plan`;
      const prices = { free: 'Free forever', pro: '$49 / month', team: '$149 / month', enterprise: 'Custom pricing' };
      document.getElementById('plan-description').textContent = prices[plan] || '';

      // Status
      const statusEl  = document.getElementById('plan-status');
      const dotClass  = subscription.status;
      const statusTxt = { free: 'Free tier', active: 'Active', past_due: 'Past due', canceled: 'Cancelled' }[subscription.status] || capitalize(subscription.status);
      statusEl.innerHTML = `<span class="status-dot ${dotClass}"></span>${statusTxt}`;

      // Limits
      document.getElementById('plan-daily').textContent   = subscription.limits?.scansPerDay   ?? '—';
      document.getElementById('plan-monthly').textContent = subscription.limits?.scansPerMonth ?? '—';

      // Renewal
      const renewalEl = document.getElementById('plan-renewal');
      renewalEl.textContent = subscription.renewalDate
        ? new Date(subscription.renewalDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
        : (plan === 'free' ? 'N/A' : 'Complimentary');

      // Usage counters
      const u = subscription.usage || {};
      const today = u.scansToday   || 0;
      const month = u.scansThisMonth || 0;
      const all   = u.scansAllTime  || 0;

      document.getElementById('scans-today').textContent = today;
      document.getElementById('scans-month').textContent = month;
      document.getElementById('scans-total').textContent = all;

      const dLimit = subscription.limits?.scansPerDay;
      const mLimit = subscription.limits?.scansPerMonth;
      const unlimited = (v) => v === 'Unlimited' || v === Infinity || v === null;

      if (unlimited(dLimit)) {
        document.getElementById('scans-today-limit').textContent = 'Unlimited / day';
        setBar('bar-today', 0);
      } else {
        document.getElementById('scans-today-limit').textContent = `/ ${dLimit} daily limit`;
        setBar('bar-today', dLimit > 0 ? today / dLimit * 100 : 0);
      }
      if (unlimited(mLimit)) {
        document.getElementById('scans-month-limit').textContent = 'Unlimited / month';
        setBar('bar-month', 0);
      } else {
        document.getElementById('scans-month-limit').textContent = `/ ${mLimit} this month`;
        setBar('bar-month', mLimit > 0 ? month / mLimit * 100 : 0);
      }

      // Action button
      if (plan !== 'free') {
        document.getElementById('plan-action-btn').textContent = 'Manage Subscription';
      }
    }

    function setBar(id, pct) {
      const el = document.getElementById(id);
      const clamped = Math.min(100, Math.max(0, pct || 0));
      el.style.width  = `${clamped}%`;
      el.className    = `usage-bar-fill${clamped >= 100 ? ' full' : clamped >= 80 ? ' warn' : ''}`;
    }

    async function loadScans() {
      try {
        const res = await fetch(`${API_URL}/api/scans`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) {
          document.getElementById('scans-container').innerHTML =
            '<div class="empty-state">Could not load scan history.</div>';
          return;
        }
        const data = await res.json();
        // API returns { scans: [...], total } — handle both array and object responses
        scans = Array.isArray(data) ? data : (data.scans || []);
        renderScans();
      } catch (err) {
        console.error('Failed to load scans:', err);
        document.getElementById('scans-container').innerHTML =
          '<div class="empty-state">No scans yet. Run your first scan above!</div>';
      }
    }

    function renderScans() {
      const container = document.getElementById('scans-container');
      if (scans.length === 0) {
        container.innerHTML = '<div class="empty-state">No scans yet. Run your first scan above!</div>';
        return;
      }
      container.innerHTML = scans.map(s => {
        const critical = s.summary?.critical || 0;
        const warnings = s.summary?.warnings || 0;
        const info     = s.summary?.info     || 0;
        let badge = '';
        if (critical > 0)           badge = `<span class="scan-badge badge-critical">${critical} Critical</span>`;
        else if (warnings > 0)      badge = `<span class="scan-badge badge-warning">${warnings} Warning${warnings > 1 ? 's' : ''}</span>`;
        else if (info > 0)          badge = `<span class="scan-badge badge-info">${info} Info</span>`;
        else if (s.status === 'complete') badge = `<span class="scan-badge badge-success">✓ Clear</span>`;
        const scanId = escapeHtml(s.scanId || s.id || '');
        const loadInfo = s.summary?.loadTime || (s.issues?.length ? s.issues.length + ' issue(s)' : '');
        return `
          <div class="scan-item" onclick="showScan('${scanId}')">
            <div style="min-width:0;flex:1">
              <div class="scan-url">${escapeHtml(s.url)}</div>
              <div class="scan-meta">${getTimeAgo(new Date(s.startedAt || s.created_at))}${loadInfo ? ' · ' + escapeHtml(loadInfo) : ''}</div>
            </div>
            <div style="display:flex;align-items:center;gap:10px;flex-shrink:0">
              ${s.summary?.vibeScore ? `<span style="background:${s.summary.vibeScore >= 80 ? '#22c55e' : s.summary.vibeScore >= 60 ? '#f59e0b' : '#ef4444'};color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:12px">${s.summary.vibeScore}</span>` : ''}
              ${badge}
              <span class="scan-status ${s.status}">${capitalize(s.status)}</span>
            </div>
          </div>
        `;
      }).join('');
    }

    async function startScan() {
      const urlInput = document.getElementById('url-input');
      const scanBtn  = document.getElementById('scan-btn');
      let url = urlInput.value.trim();
      if (!url) { alert('Please enter a URL'); return; }

      // Ownership verification — legal requirement
      const ownershipCheckbox = document.getElementById('own-site-checkbox');
      if (!ownershipCheckbox.checked) {
        alert('You must confirm you own or have authorization to scan this site before proceeding.');
        ownershipCheckbox.parentElement.style.outline = '2px solid var(--red)';
        ownershipCheckbox.parentElement.style.outlineOffset = '4px';
        ownershipCheckbox.parentElement.style.borderRadius = '8px';
        setTimeout(() => { ownershipCheckbox.parentElement.style.outline = 'none'; }, 3000);
        return;
      }

      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        url = 'https://' + url;
        urlInput.value = url;
      }
      scanBtn.disabled    = true;
      scanBtn.textContent = 'Scanning…';
      try {
        const res  = await fetch(`${API_URL}/api/scan`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ url, ownership_confirmed: true })
        });
        const data = await res.json();
        if (!res.ok) {
          if (data.upgrade && confirm(data.message + '\n\nWould you like to upgrade?')) { upgrade(); }
          else if (!data.upgrade) { alert('Error: ' + data.error); }
          return;
        }
        urlInput.value = '';
        await Promise.all([loadSubscription(), loadScans()]);
      } catch (err) {
        alert('Error: ' + err.message);
      } finally {
        scanBtn.disabled    = false;
        scanBtn.textContent = 'Scan Now';
      }
    }

    async function upgrade() {
      // Non-free users → try to open Stripe billing portal
      if (user.plan !== 'free') {
        try {
          const res  = await fetch(`${API_URL}/api/billing/portal`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` }
          });
          const data = await res.json();
          if (data.url) {
            window.location.href = data.url;
            return;
          } else if (data.manualPlan) {
            alert('Your plan is managed directly — no billing portal needed.\nNeed to make changes? Email support@vibeqa.io.');
            return;
          }
          // Portal unavailable (no Stripe customer) → fall through to checkout picker below
        } catch (err) {
          console.warn('Portal request failed, showing checkout picker:', err.message);
        }
      }

      // Plan picker for new upgrades or when portal unavailable
      const pick = prompt(
        `${user.plan !== 'free' ? 'Set up billing for your account:\n\n' : 'Choose a plan:\n\n'}` +
        '1. Pro ($49/mo) — 100 scans/day, 1,000/month\n' +
        '2. Team ($149/mo) — 500 scans/day, 5,000/month\n\n' +
        'Enter 1 or 2 (or Cancel to dismiss):'
      );
      if (pick !== '1' && pick !== '2') return;

      const planName = pick === '1' ? 'pro' : 'team';
      const btn = document.getElementById('plan-action-btn');
      const origText = btn.textContent;
      btn.disabled = true;
      btn.textContent = 'Processing…';

      try {
        const res  = await fetch(`${API_URL}/api/billing/checkout`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ plan: planName })
        });
        const data = await res.json();

        if (data.url) {
          // Real Stripe checkout — redirect
          window.location.href = data.url;
        } else if (data.demo) {
          // Instant upgrade (demo/no-payment mode) — refresh everything
          alert(data.message || `Upgraded to ${capitalize(planName)}!`);
          const userRes = await fetch(`${API_URL}/api/auth/me`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          if (userRes.ok) {
            user = await userRes.json();
            updateNavUI();
          }
          await loadSubscription();
        } else {
          alert('Could not complete upgrade: ' + (data.error || 'Unknown error. Please try again.'));
        }
      } catch (err) {
        alert('Error: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = origText;
      }
    }

    // ── Scan detail modal ─────────────────────────────────────────
    function showScan(scanId) {
      currentScan = scans.find(s => (s.scanId || s.id) === scanId);
      if (!currentScan) return;

      document.getElementById('modal-title').textContent = currentScan.url;

      // Meta line: date · load time · issue counts
      const critical = currentScan.summary?.critical || 0;
      const warnings = currentScan.summary?.warnings || 0;
      const info     = currentScan.summary?.info     || 0;
      const total    = currentScan.issues?.length    || (critical + warnings + info);
      const metaParts = [
        getTimeAgo(new Date(currentScan.startedAt || currentScan.created_at)),
        currentScan.summary?.loadTime ? `Load: ${currentScan.summary.loadTime}` : null,
        total > 0 ? `${total} issue${total !== 1 ? 's' : ''}` : 'No issues found',
      ].filter(Boolean);
      document.getElementById('modal-meta').textContent = metaParts.join(' · ');

      const issuesContainer = document.getElementById('modal-issues');
      const issues = currentScan.issues || [];

      // Render Vibe Score if available (Pro/Team/Enterprise)
      let vibeScoreHtml = '';
      if (currentScan.vibeScore) {
        const vs = currentScan.vibeScore;
        const overallColor = vs.overall >= 80 ? '#22c55e' : vs.overall >= 60 ? '#f59e0b' : vs.overall >= 40 ? '#f97316' : '#ef4444';
        const categories = [
          { label: 'Design', score: vs.design },
          { label: 'UX', score: vs.ux },
          { label: 'Conversion', score: vs.conversion },
          { label: 'Content', score: vs.content },
          { label: 'Trust', score: vs.trust },
          { label: 'Technical', score: vs.technical },
          { label: 'Mobile', score: vs.mobile },
          { label: 'SEO', score: vs.seo },
        ].filter(c => c.score != null);

        vibeScoreHtml = `
          <div style="background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:16px;padding:24px;margin-bottom:20px;color:#fff">
            <div style="display:flex;align-items:center;gap:24px;margin-bottom:16px">
              <div style="text-align:center">
                <div style="font-size:48px;font-weight:800;color:${overallColor};line-height:1">${vs.overall}</div>
                <div style="font-size:11px;opacity:0.7;margin-top:4px">VIBE SCORE</div>
              </div>
              <div style="flex:1">
                ${currentScan.aiInsights?.headline ? `<div style="font-size:14px;font-weight:600;margin-bottom:8px">${escapeHtml(currentScan.aiInsights.headline)}</div>` : ''}
                ${currentScan.aiInsights?.topPriority ? `<div style="font-size:12px;opacity:0.8">Top priority: ${escapeHtml(currentScan.aiInsights.topPriority)}</div>` : ''}
              </div>
            </div>
            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
              ${categories.map(c => {
                const catColor = c.score >= 80 ? '#22c55e' : c.score >= 60 ? '#f59e0b' : '#ef4444';
                return `<div style="text-align:center;padding:8px;background:rgba(255,255,255,0.05);border-radius:8px">
                  <div style="font-size:18px;font-weight:700;color:${catColor}">${c.score}</div>
                  <div style="font-size:10px;opacity:0.6">${c.label}</div>
                </div>`;
              }).join('')}
            </div>
            ${currentScan.aiInsights?.quickWins ? `
              <div style="margin-top:16px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.1)">
                <div style="font-size:11px;text-transform:uppercase;opacity:0.5;margin-bottom:8px">Quick Wins</div>
                ${currentScan.aiInsights.quickWins.map(w => `<div style="font-size:12px;padding:4px 0;opacity:0.9">• ${escapeHtml(w)}</div>`).join('')}
              </div>
            ` : ''}
          </div>
        `;
      }

      if (issues.length > 0) {
        issuesContainer.innerHTML = vibeScoreHtml + issues.map(issue => `
          <div class="issue ${issue.type || 'info'}${issue.source === 'ai' ? ' ai-issue' : ''}">
            <div class="issue-header">
              <span class="issue-title">${issue.source === 'ai' ? '<span style="background:linear-gradient(90deg,#8b5cf6,#6366f1);color:#fff;font-size:9px;padding:2px 6px;border-radius:4px;margin-right:6px">' + (issue.aiModel === 'premium' ? 'AI PREMIUM' : 'AI') + '</span>' : ''}${escapeHtml(issue.title || '')}</span>
              <span class="issue-category">${escapeHtml(issue.category || '')}</span>
            </div>
            <p class="issue-description">${escapeHtml(issue.description || '')}</p>
            ${issue.suggestion ? `<div class="issue-suggestion"><strong>How to fix:</strong> ${escapeHtml(issue.suggestion)}</div>` : ''}
          </div>
        `).join('');
      } else {
        issuesContainer.innerHTML = vibeScoreHtml + '<p style="color:var(--gray-400);text-align:center;padding:32px">No issues found — site looks great! 🎉</p>';
      }

      document.getElementById('scan-modal').classList.add('visible');
    }

    function closeModal() {
      document.getElementById('scan-modal').classList.remove('visible');
      currentScan = null;
    }

    function copyAsPrompt() {
      if (!currentScan || !currentScan.issues || currentScan.issues.length === 0) {
        alert('No issues to copy.');
        return;
      }
      let promptText = `I ran a VibeQA scan on ${currentScan.url} and found the following issues. Please fix them:\n\n`;
      currentScan.issues.forEach((issue, i) => {
        promptText += `## ${i + 1}. ${issue.title} (${issue.category})\n`;
        promptText += `**Problem:** ${issue.description}\n`;
        if (issue.suggestion) promptText += `**How to fix:** ${issue.suggestion}\n`;
        promptText += '\n';
      });
      promptText += `---\nPlease implement these fixes and show me the code changes needed.`;

      navigator.clipboard.writeText(promptText).then(() => {
        const btn = document.getElementById('modal-copy-btn');
        btn.classList.add('copied');
        btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg> Copied!`;
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> Copy as Prompt`;
        }, 2000);
      }).catch(() => {
        // Fallback for non-HTTPS or clipboard denial
        const ta = document.createElement('textarea');
        ta.value = promptText;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        alert('Copied to clipboard!');
      });
    }

    function getTimeAgo(date) {
      if (!date || isNaN(date)) return '—';
      const diff    = Date.now() - date;
      const minutes = Math.floor(diff / 60000);
      const hours   = Math.floor(diff / 3600000);
      const days    = Math.floor(diff / 86400000);
      if (minutes < 1)  return 'Just now';
      if (minutes < 60) return `${minutes}m ago`;
      if (hours   < 24) return `${hours}h ago`;
      if (days    < 7)  return `${days}d ago`;
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    // Close modal on Escape key
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
    // ─────────────────────────────────────────────────────────────

    function logout() {
      fetch(`${API_URL}/api/auth/logout`, {
        method: 'POST', headers: { 'Authorization': `Bearer ${token}` }
      });
      localStorage.removeItem('vibeqa_token');
      window.location.href = '/';
    }

    function escapeHtml(text) {
      const d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML;
    }

    function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }

    function formatDate(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
    }

    document.getElementById('url-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') startScan();
    });

    init();
  </script>

</body>
