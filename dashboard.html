<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — VibeQA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white: #FFFFFF;
      --black: #09090B;
      --gray-50: #F4F4F5;
      --gray-100: #E4E4E7;
      --gray-200: #D4D4D8;
      --gray-300: #A1A1AA;
      --gray-400: #71717A;
      --gray-500: #52525B;
      --gray-600: #3F3F46;
      --gray-900: #18181B;
      --accent: #6366F1;
      --accent-dark: #4F46E5;
      --green: #22C55E;
      --red: #EF4444;
      --yellow: #F59E0B;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--gray-50);
      color: var(--black);
      line-height: 1.6;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    h1, h2, h3, h4 { line-height: 1.2; letter-spacing: -0.025em; font-weight: 600; }

    .container { max-width: 1120px; margin: 0 auto; padding: 0 24px; }

    nav {
      background: var(--white);
      border-bottom: 1px solid var(--gray-100);
      padding: 16px 0;
    }

    nav .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo { font-size: 20px; font-weight: 700; color: var(--black); text-decoration: none; }
    .logo span { color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .user-info { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--gray-600); }

    .plan-badge {
      padding: 2px 8px; border-radius: 4px;
      font-size: 12px; font-weight: 600; text-transform: uppercase;
    }
    .plan-badge.free       { background: var(--gray-100); color: var(--gray-600); }
    .plan-badge.pro        { background: #E0E7FF; color: var(--accent); }
    .plan-badge.team       { background: #DCFCE7; color: #16A34A; }
    .plan-badge.enterprise { background: #FEF3C7; color: #D97706; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 8px 16px; border-radius: 8px; font-weight: 500; font-size: 14px;
      text-decoration: none; cursor: pointer; border: none; transition: all 0.15s;
    }
    .btn-primary   { background: var(--black); color: var(--white); }
    .btn-primary:hover { background: var(--gray-900); }
    .btn-secondary { background: transparent; color: var(--gray-600); border: 1px solid var(--gray-200); }
    .btn-secondary:hover { background: var(--gray-50); }
    .btn-accent    { background: var(--accent); color: var(--white); }
    .btn-accent:hover { background: var(--accent-dark); }

    main { padding: 40px 0; }

    .dashboard-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 32px;
    }
    .dashboard-header h1 { font-size: 24px; }

    /* ── Stats row ── */
    .stats {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 20px; margin-bottom: 24px;
    }
    .stat-card {
      background: var(--white); padding: 24px;
      border-radius: 12px; border: 1px solid var(--gray-100);
    }
    .stat-card h3 {
      font-size: 12px; color: var(--gray-400); font-weight: 500;
      margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .stat-card .value  { font-size: 32px; font-weight: 700; }
    .stat-card .subtext { font-size: 13px; color: var(--gray-400); margin-top: 4px; }

    .usage-bar-wrap { margin-top: 8px; }
    .usage-bar-bg { height: 4px; background: var(--gray-100); border-radius: 99px; overflow: hidden; }
    .usage-bar-fill {
      height: 100%; border-radius: 99px; background: var(--accent);
      transition: width 0.4s ease;
    }
    .usage-bar-fill.warn { background: var(--yellow); }
    .usage-bar-fill.full { background: var(--red); }

    /* ── Plan card ── */
    .plan-card {
      background: var(--white); border-radius: 12px; border: 1px solid var(--gray-100);
      padding: 24px; margin-bottom: 24px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 24px; flex-wrap: wrap;
    }
    .plan-card-left { display: flex; align-items: center; gap: 16px; }
    .plan-icon {
      width: 44px; height: 44px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .plan-icon.free       { background: var(--gray-100); }
    .plan-icon.pro        { background: #E0E7FF; }
    .plan-icon.team       { background: #DCFCE7; }
    .plan-icon.enterprise { background: #FEF3C7; }
    .plan-card-info h2 { font-size: 16px; margin-bottom: 4px; }
    .plan-card-info p  { font-size: 13px; color: var(--gray-400); }
    .plan-card-meta { display: flex; gap: 32px; flex-wrap: wrap; }
    .plan-meta-item { text-align: center; }
    .plan-meta-item .meta-label { font-size: 12px; color: var(--gray-400); margin-bottom: 2px; }
    .plan-meta-item .meta-value { font-size: 15px; font-weight: 600; }

    .status-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      margin-right: 5px; vertical-align: middle;
    }
    .status-dot.active   { background: var(--green); }
    .status-dot.free     { background: var(--gray-300); }
    .status-dot.past_due { background: var(--yellow); }
    .status-dot.canceled { background: var(--red); }

    /* ── Scanner ── */
    .scanner-box {
      background: var(--white); padding: 24px;
      border-radius: 12px; border: 1px solid var(--gray-100); margin-bottom: 24px;
    }
    .scanner-box h2 { font-size: 16px; margin-bottom: 16px; }
    .scanner-input { display: flex; gap: 12px; }
    .scanner-input input {
      flex: 1; padding: 12px 16px; border: 1px solid var(--gray-200);
      border-radius: 8px; font-size: 15px; font-family: inherit; outline: none;
    }
    .scanner-input input:focus { border-color: var(--accent); }

    /* ── Scans list ── */
    .scans-list {
      background: var(--white); border-radius: 12px; border: 1px solid var(--gray-100);
    }
    .scans-list h2 {
      font-size: 16px; padding: 20px 24px; border-bottom: 1px solid var(--gray-100);
    }
    .scan-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 24px; border-bottom: 1px solid var(--gray-100);
    }
    .scan-item:last-child { border-bottom: none; }
    .scan-url  { font-weight: 500; color: var(--black); margin-bottom: 4px; }
    .scan-meta { font-size: 13px; color: var(--gray-400); }
    .scan-status {
      padding: 4px 10px; border-radius: 100px; font-size: 12px; font-weight: 500;
    }
    .scan-status.complete { background: #DCFCE7; color: #16A34A; }
    .scan-status.scanning { background: #FEF3C7; color: #D97706; }
    .scan-status.error    { background: #FEE2E2; color: #DC2626; }
    .scan-status.pending  { background: var(--gray-100); color: var(--gray-500); }

    .empty-state { text-align: center; padding: 60px 24px; color: var(--gray-400); }

    @media (max-width: 768px) {
      .stats { grid-template-columns: 1fr; }
      .scanner-input { flex-direction: column; }
      .plan-card { flex-direction: column; align-items: flex-start; }
      .plan-card-meta { gap: 16px; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="container">
      <a href="/" class="logo">Vibe<span>QA</span></a>
      <div class="nav-right">
        <div class="user-info">
          <span id="user-email"></span>
          <span class="plan-badge free" id="plan-badge">Free</span>
        </div>
        <button class="btn btn-secondary" id="upgrade-btn" onclick="upgrade()">Upgrade</button>
        <a href="/settings" class="btn btn-secondary">Settings</a>
        <button class="btn btn-secondary" onclick="logout()">Log out</button>
      </div>
    </div>
  </nav>

  <main>
    <div class="container">
      <div class="dashboard-header">
        <h1>Dashboard</h1>
      </div>

      <!-- Usage stats -->
      <div class="stats">
        <div class="stat-card">
          <h3>Scans Today</h3>
          <div class="value" id="scans-today">—</div>
          <div class="subtext" id="scans-today-limit">loading…</div>
          <div class="usage-bar-wrap">
            <div class="usage-bar-bg">
              <div class="usage-bar-fill" id="bar-today" style="width:0%"></div>
            </div>
          </div>
        </div>
        <div class="stat-card">
          <h3>Scans This Month</h3>
          <div class="value" id="scans-month">—</div>
          <div class="subtext" id="scans-month-limit">loading…</div>
          <div class="usage-bar-wrap">
            <div class="usage-bar-bg">
              <div class="usage-bar-fill" id="bar-month" style="width:0%"></div>
            </div>
          </div>
        </div>
        <div class="stat-card">
          <h3>Total Scans</h3>
          <div class="value" id="scans-total">—</div>
          <div class="subtext">all time</div>
        </div>
      </div>

      <!-- Plan / Subscription card -->
      <div class="plan-card">
        <div class="plan-card-left">
          <div class="plan-icon free" id="plan-icon">✦</div>
          <div class="plan-card-info">
            <h2 id="plan-display-name">Loading plan…</h2>
            <p id="plan-description">Fetching your subscription details</p>
          </div>
        </div>
        <div class="plan-card-meta">
          <div class="plan-meta-item">
            <div class="meta-label">Status</div>
            <div class="meta-value" id="plan-status">—</div>
          </div>
          <div class="plan-meta-item">
            <div class="meta-label">Daily limit</div>
            <div class="meta-value" id="plan-daily">—</div>
          </div>
          <div class="plan-meta-item">
            <div class="meta-label">Monthly limit</div>
            <div class="meta-value" id="plan-monthly">—</div>
          </div>
          <div class="plan-meta-item">
            <div class="meta-label">Renews</div>
            <div class="meta-value" id="plan-renewal">—</div>
          </div>
        </div>
        <button class="btn btn-accent" id="plan-action-btn" onclick="upgrade()">Upgrade Plan</button>
      </div>

      <!-- Scanner -->
      <div class="scanner-box">
        <h2>Run New Scan</h2>
        <div class="scanner-input">
          <input type="url" id="url-input" placeholder="https://your-site.com" />
          <button class="btn btn-accent" id="scan-btn" onclick="startScan()">Scan Now</button>
        </div>
      </div>

      <!-- Recent scans -->
      <div class="scans-list">
        <h2>Recent Scans</h2>
        <div id="scans-container">
          <div class="empty-state">Loading scans…</div>
        </div>
      </div>
    </div>
  </main>

  <script>
    // API_URL: vibeqa.io in production (Netlify proxies /api/auth|billing|user/* to Railway)
    const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:3847'
      : 'https://vibeqa.io';

    let token = localStorage.getItem('vibeqa_token');
    let user  = null;
    let subscription = null;

    async function init() {
      if (!token) { window.location.href = '/'; return; }

      try {
        const res = await fetch(`${API_URL}/api/auth/me`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) {
          localStorage.removeItem('vibeqa_token');
          window.location.href = '/';
          return;
        }
        user = await res.json();
        updateNavUI();
        // Load subscription and scans in parallel
        await Promise.all([loadSubscription(), loadScans()]);
      } catch (err) {
        console.error('Init error:', err);
        window.location.href = '/';
      }
    }

    function updateNavUI() {
      document.getElementById('user-email').textContent = user.email;
      const badge = document.getElementById('plan-badge');
      badge.textContent = capitalize(user.plan);
      badge.className   = `plan-badge ${user.plan}`;
      if (user.plan !== 'free') {
        document.getElementById('upgrade-btn').textContent = 'Manage';
      }
    }

    async function loadSubscription() {
      try {
        const res = await fetch(`${API_URL}/api/user/subscriptions`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.ok) {
          subscription = await res.json();
        } else {
          // Graceful fallback to billing/info
          const fb = await fetch(`${API_URL}/api/billing/info`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          const info = fb.ok ? await fb.json() : {};
          subscription = buildFallbackSubscription(info);
        }
      } catch (err) {
        console.warn('Using fallback subscription data:', err.message);
        subscription = buildFallbackSubscription({});
      }
      renderSubscription();
    }

    function buildFallbackSubscription(info) {
      const plan = info.plan || user.plan || 'free';
      const limits = {
        free: { day: 1,        month: 30  },
        pro:  { day: 10,       month: 100 },
        team: { day: 'Unlimited', month: 'Unlimited' },
      };
      const l = limits[plan] || limits.free;
      return {
        currentPlan: plan,
        planLabel: capitalize(plan),
        status: plan === 'free' ? 'free' : 'active',
        renewalDate: null,
        limits: { scansPerDay: l.day, scansPerMonth: l.month },
        usage: { scansToday: 0, scansThisMonth: 0, scansAllTime: 0 },
      };
    }

    function renderSubscription() {
      const plan = subscription.currentPlan;

      // Icon + name + price
      const icon = document.getElementById('plan-icon');
      icon.className  = `plan-icon ${plan}`;
      icon.textContent = plan === 'free' ? '✦' : plan === 'pro' ? '⚡' : '🚀';
      document.getElementById('plan-display-name').textContent = `${subscription.planLabel} Plan`;
      const prices = { free: 'Free forever', pro: '$29 / month', team: '$79 / month', enterprise: 'Custom pricing' };
      document.getElementById('plan-description').textContent = prices[plan] || '';

      // Status
      const statusEl  = document.getElementById('plan-status');
      const dotClass  = subscription.status;
      const statusTxt = { free: 'Free tier', active: 'Active', past_due: 'Past due', canceled: 'Cancelled' }[subscription.status] || capitalize(subscription.status);
      statusEl.innerHTML = `<span class="status-dot ${dotClass}"></span>${statusTxt}`;

      // Limits
      document.getElementById('plan-daily').textContent   = subscription.limits?.scansPerDay   ?? '—';
      document.getElementById('plan-monthly').textContent = subscription.limits?.scansPerMonth ?? '—';

      // Renewal
      const renewalEl = document.getElementById('plan-renewal');
      renewalEl.textContent = subscription.renewalDate
        ? new Date(subscription.renewalDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
        : (plan === 'free' ? 'N/A' : '—');

      // Usage counters
      const u = subscription.usage || {};
      const today = u.scansToday   || 0;
      const month = u.scansThisMonth || 0;
      const all   = u.scansAllTime  || 0;

      document.getElementById('scans-today').textContent = today;
      document.getElementById('scans-month').textContent = month;
      document.getElementById('scans-total').textContent = all;

      const dLimit = subscription.limits?.scansPerDay;
      const mLimit = subscription.limits?.scansPerMonth;
      const unlimited = (v) => v === 'Unlimited' || v === Infinity || v === null;

      if (unlimited(dLimit)) {
        document.getElementById('scans-today-limit').textContent = 'Unlimited / day';
        setBar('bar-today', 0);
      } else {
        document.getElementById('scans-today-limit').textContent = `/ ${dLimit} daily limit`;
        setBar('bar-today', dLimit > 0 ? today / dLimit * 100 : 0);
      }
      if (unlimited(mLimit)) {
        document.getElementById('scans-month-limit').textContent = 'Unlimited / month';
        setBar('bar-month', 0);
      } else {
        document.getElementById('scans-month-limit').textContent = `/ ${mLimit} this month`;
        setBar('bar-month', mLimit > 0 ? month / mLimit * 100 : 0);
      }

      // Action button
      if (plan !== 'free') {
        document.getElementById('plan-action-btn').textContent = 'Manage Subscription';
      }
    }

    function setBar(id, pct) {
      const el = document.getElementById(id);
      const clamped = Math.min(100, Math.max(0, pct || 0));
      el.style.width  = `${clamped}%`;
      el.className    = `usage-bar-fill${clamped >= 100 ? ' full' : clamped >= 80 ? ' warn' : ''}`;
    }

    async function loadScans() {
      try {
        const res = await fetch(`${API_URL}/api/scans`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) {
          document.getElementById('scans-container').innerHTML =
            '<div class="empty-state">Could not load scan history.</div>';
          return;
        }
        const data  = await res.json();
        // API returns { scans: [...], total } — handle both array and object responses
        const scans = Array.isArray(data) ? data : (data.scans || []);
        const container = document.getElementById('scans-container');
        if (scans.length === 0) {
          container.innerHTML = '<div class="empty-state">No scans yet. Run your first scan above!</div>';
          return;
        }
        container.innerHTML = scans.map(s => `
          <div class="scan-item">
            <div>
              <div class="scan-url">${escapeHtml(s.url)}</div>
              <div class="scan-meta">${formatDate(s.startedAt || s.created_at)} · ${s.summary?.loadTime || (s.issues?.length ? s.issues.length + ' issue(s)' : 'No issues found')}</div>
            </div>
            <span class="scan-status ${s.status}">${capitalize(s.status)}</span>
          </div>
        `).join('');
      } catch (err) {
        console.error('Failed to load scans:', err);
        document.getElementById('scans-container').innerHTML =
          '<div class="empty-state">No scans yet. Run your first scan above!</div>';
      }
    }

    async function startScan() {
      const urlInput = document.getElementById('url-input');
      const scanBtn  = document.getElementById('scan-btn');
      let url = urlInput.value.trim();
      if (!url) { alert('Please enter a URL'); return; }
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        url = 'https://' + url;
        urlInput.value = url;
      }
      scanBtn.disabled    = true;
      scanBtn.textContent = 'Scanning…';
      try {
        const res  = await fetch(`${API_URL}/api/scan`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ url })
        });
        const data = await res.json();
        if (!res.ok) {
          if (data.upgrade && confirm(data.message + '\n\nWould you like to upgrade?')) { upgrade(); }
          else if (!data.upgrade) { alert('Error: ' + data.error); }
          return;
        }
        urlInput.value = '';
        await Promise.all([loadSubscription(), loadScans()]);
      } catch (err) {
        alert('Error: ' + err.message);
      } finally {
        scanBtn.disabled    = false;
        scanBtn.textContent = 'Scan Now';
      }
    }

    async function upgrade() {
      if (user.plan !== 'free') {
        try {
          const res  = await fetch(`${API_URL}/api/billing/portal`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` }
          });
          const data = await res.json();
          if (data.url) { window.location.href = data.url; }
          else { alert('No active subscription to manage'); }
        } catch (err) { alert('Error: ' + err.message); }
        return;
      }
      const pick = prompt('Choose a plan:\n1. Pro ($29/mo) — 10 scans/day, 100/month\n2. Team ($79/mo) — Unlimited scans\n\nEnter 1 or 2:');
      if (pick === '1' || pick === '2') {
        const planName = pick === '1' ? 'pro' : 'team';
        try {
          const res  = await fetch(`${API_URL}/api/billing/checkout`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ plan: planName })
          });
          const data = await res.json();
          if (data.url) {
            window.location.href = data.url;
          } else if (data.demo) {
            alert(data.message);
            const userRes = await fetch(`${API_URL}/api/auth/me`, { headers: { 'Authorization': `Bearer ${token}` } });
            user = await userRes.json();
            updateNavUI();
            await loadSubscription();
          }
        } catch (err) { alert('Error: ' + err.message); }
      }
    }

    function logout() {
      fetch(`${API_URL}/api/auth/logout`, {
        method: 'POST', headers: { 'Authorization': `Bearer ${token}` }
      });
      localStorage.removeItem('vibeqa_token');
      window.location.href = '/';
    }

    function escapeHtml(text) {
      const d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML;
    }

    function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }

    function formatDate(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
    }

    document.getElementById('url-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') startScan();
    });

    init();
  </script>

</body>
</html>
